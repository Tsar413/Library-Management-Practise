server:
  port: 8099

spring:
  thymeleaf:
    cache: false
    prefix: classpath:/views/
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/study_library_management?allowPublicKeyRetrieval=true&useSSL=false&characterEncoding=UTF-8&serverTimezone=GMT%2B8
    username: 
    password: 
  jpa:
    hibernate:
      ddl-auto: update
      show-sql: true
  redis:
    host: 127.0.0.1
    port: 16379
    password: 
    database: 0
    timeout: 2000ms

mybatis:
  configuration:
    map-underscore-to-camel-case: true

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl